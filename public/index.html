<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Librarian</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div class="header-left">
      <button id="sidebarToggle" class="icon-btn" aria-label="Toggle sidebar">☰</button>
      <h1>The Librarian</h1>
    </div>
    <div class="toolbar">
      <button class="primary" id="refresh">Refresh</button>
      <button id="newMemory">New Memory</button>
    </div>
  </header>
  <main>
    <aside>
      <label>Search <input id="search" placeholder="Filter memories"></label>
      <label>Agent <select id="agent"><option value="">All agents</option></select></label>
      <label>Project <select id="project"><option value="">All projects</option></select></label>
      <label>Category
        <select id="category">
          <option value="">All categories</option>
          <option>identity</option><option>relationship</option><option>preferences</option>
          <option>projects</option><option>environment</option><option>tools</option>
          <option>lessons</option><option>people</option><option>open_threads</option>
        </select>
      </label>
      <label>Visibility
        <select id="visibility">
          <option value="">All visibility</option>
          <option>common</option>
          <option>agent_private</option>
        </select>
      </label>
      <label>From <input type="date" id="dateFrom"></label>
      <label>To <input type="date" id="dateTo"></label>
      <button class="primary" id="recall">Recall</button>
      <p class="status" id="status"></p>
    </aside>
    <div class="content-area">
      <nav class="tabs">
        <button class="tab active" data-tab="browse">Browse</button>
        <button class="tab" data-tab="sessions">Sessions</button>
        <button class="tab" data-tab="analytics">Analytics</button>
        <button class="tab" data-tab="proposals">Proposals</button>
        <button class="tab" data-tab="conflicts">Conflicts</button>
        <button class="tab" data-tab="archive">Archive</button>
        <button class="tab" data-tab="logs">Logs</button>
      </nav>

      <div id="sortBar" class="sort-bar hidden">
        <label>Sort
          <select id="sortField">
            <option value="updated_at">Last updated</option>
            <option value="created_at">Created</option>
            <option value="title">Title</option>
            <option value="priority">Priority</option>
          </select>
        </label>
        <label>
          <select id="sortOrder">
            <option value="desc">Newest first</option>
            <option value="asc">Oldest first</option>
          </select>
        </label>
      </div>

      <div id="eventControls" class="event-controls hidden">
        <select id="eventType">
          <option value="">All event types</option>
          <option>memory.recall_empty</option>
          <option>memory.recalled</option>
          <option>memory.verified</option>
          <option>memory.created</option>
          <option>memory.proposed</option>
          <option>memory.updated</option>
          <option>memory.deleted</option>
          <option>memory.approved</option>
          <option>memory.rejected</option>
          <option>memory.conflict_detected</option>
          <option>memory.conflict_resolved</option>
        </select>
        <select id="eventResult">
          <option value="">All verification results</option>
          <option>useful</option>
          <option>not_useful</option>
          <option>outdated</option>
          <option>wrong</option>
        </select>
        <input id="eventAgent" placeholder="agent id">
        <input id="eventQuery" placeholder="log search">
        <button id="eventApply">Apply</button>
        <button id="eventPrev">Previous</button>
        <button id="eventNext">Next</button>
        <span class="status" id="eventPage"></span>
      </div>

      <div id="newForm" class="memory hidden">
        <div class="editor">
          <label>Title <input id="formTitle"></label>
          <label>Body <textarea id="formBody"></textarea></label>
          <label>Category <select id="formCategory">
            <option value="lessons">lessons</option>
            <option value="identity">identity (protected)</option>
            <option value="relationship">relationship (protected)</option>
            <option value="preferences">preferences</option>
            <option value="projects">projects</option>
            <option value="environment">environment</option>
            <option value="tools">tools</option>
            <option value="people">people</option>
            <option value="open_threads">open_threads</option>
          </select></label>
          <p class="hint">Protected categories are identity and relationship. Agents can only propose them; dashboard edits apply directly.</p>
          <label>Visibility <select id="formVisibility"><option>common</option><option>agent_private</option></select></label>
          <label>Scope <select id="formScope"><option>global</option><option>project</option><option>environment</option><option>tool</option><option>session</option></select></label>
          <label>Tags <input id="formTags" placeholder="comma-separated"></label>
          <button class="primary" id="saveNew">Save</button>
        </div>
      </div>

      <div id="browseLayout" class="browse-layout">
        <div class="memory-list" id="list"></div>
        <div id="detailPanel" class="detail-panel hidden">
          <button id="detailClose">×</button>
          <div id="detailContent"></div>
          <section id="relatedSection" class="hidden">
            <h3>Related memories</h3>
            <div id="relatedList"></div>
          </section>
        </div>
      </div>

      <div id="analyticsTab" class="tab-content hidden">
        <div class="chart-grid">
          <div class="chart-card"><canvas id="chartByAgent"></canvas></div>
          <div class="chart-card"><canvas id="chartByCategory"></canvas></div>
          <div class="chart-card"><canvas id="chartByProject"></canvas></div>
          <div class="chart-card"><canvas id="chartByStatus"></canvas></div>
          <div class="chart-card"><canvas id="chartByScope"></canvas></div>
        </div>
      </div>

      <div id="sessionsTab" class="tab-content hidden">
        <div class="session-controls">
          <input id="sessionSearch" placeholder="Search session events">
          <input id="sessionProject" placeholder="Project key (optional)">
          <label class="inline"><input type="checkbox" id="sessionIncludeArchived"> Include archived</label>
          <label class="inline"><input type="checkbox" id="sessionIncludeDeleted"> Include deleted</label>
          <button id="sessionRefresh">Refresh</button>
        </div>
        <div class="session-layout">
          <div class="session-list" id="sessionList"></div>
          <div id="sessionDetail" class="session-detail hidden"></div>
        </div>
      </div>
    </div>
  </main>
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="/app.js" defer></script>
</body>
</html>
