# Example Hermes config snippet for The Librarian session layer.
# Merge this into your Hermes configuration; values shown are illustrative.

librarian:
  # Canonical Librarian HTTP MCP endpoint. There is one shared instance across
  # all harnesses; do not point Hermes at a local-only install for sessions.
  mcp_url: "https://librarian.internal.example/mcp"

  # Per-agent token; the server uses this to attribute sessions and apply
  # owner-or-admin checks. Use LIBRARIAN_AGENT_TOKENS on the server side,
  # one entry per Hermes-hosted agent.
  agent_token_env: LIBRARIAN_AGENT_TOKEN

  # Capture mode default. Never set to "log" for Hermes traffic — raw transcript
  # capture goes through the safe-fallback-capture mechanism, not this knob.
  default_capture_mode: summary

  # Default project key for sessions started in this Hermes deployment.
  # Override per-session via /lib:session start [...] --project <key>.
  default_project_key: the-librarian

slash_commands:
  - name: /lib:session
    description: Manage Librarian sessions
    handler: librarianSessionHandler
    arg_schema: free-text
