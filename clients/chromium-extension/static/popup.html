<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clip to Librarian</title>
    <link rel="stylesheet" href="fonts.css" />
    <style>
      /* The Librarian "Reading Room" system (see DESIGN.md): warm paper + ink,
         a single verdigris rubric accent reserved for the one action that
         matters, flat (no shadows), sharp corners, hairline rules, editorial
         serif headings + IBM Plex Mono for machine text. The clipper is always
         the light Manuscript palette (it does not follow the OS dark mode).
         Fonts fall back to system serif/mono when Fraunces / Newsreader / Plex
         Mono aren't installed. */
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --surface: #faf7f0;
        --ink: #1a1612;
        --muted: #6f675a;
        --accent: #3f9c8e;
        --accent-fg: #faf7f0;
        --hairline: rgba(26, 22, 18, 0.14);
        --mono-fill: #ede7d8;
        --error: #9b3d1f;
        --display: "Fraunces", Georgia, "Times New Roman", serif;
        --body: "Newsreader", Georgia, "Times New Roman", serif;
        --mono: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
      }
      * {
        box-sizing: border-box;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 18px 18px 16px;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--body);
        line-height: 1.5;
      }
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-bottom: 14px;
        margin-bottom: 16px;
        border-bottom: 1px solid var(--hairline);
      }
      header img {
        width: 28px;
        height: 28px;
        display: block;
      }
      .title {
        font-family: var(--display);
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.01em;
        line-height: 1.1;
      }
      .kicker {
        display: block;
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--muted);
        margin-top: 3px;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        font-family: var(--display);
        font-size: 15px;
        cursor: pointer;
        border: 1px solid var(--accent);
        border-radius: 0;
        background: var(--accent);
        color: var(--accent-fg);
        transition: opacity 0.12s ease;
      }
      button:hover {
        opacity: 0.9;
      }
      button:disabled {
        opacity: 0.55;
        cursor: progress;
      }
      #status {
        font-family: var(--mono);
        font-size: 12px;
        min-height: 1.5em;
        margin: 14px 0 0;
        color: var(--muted);
      }
      #status[data-tone="ok"] {
        color: var(--accent);
      }
      #status[data-tone="error"] {
        color: var(--error);
      }
      footer {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--hairline);
        font-family: var(--mono);
        font-size: 11px;
      }
      a {
        color: var(--muted);
        text-decoration: none;
        border-bottom: 1px solid var(--hairline);
      }
      a:hover {
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/icon48.png" alt="" />
      <span class="title">The Librarian<span class="kicker">Web clipper</span></span>
    </header>
    <button id="clip" type="button">Clip this page</button>
    <p id="status" data-tone="idle"></p>
    <footer><a id="open-options" href="#">Settings</a></footer>
    <script src="popup.js"></script>
  </body>
</html>
