name: Release

# The "every merge to main IS a release" model. When a PR that bumped the root
# package.json version lands on main, this cuts the matching tag + GitHub
# release automatically — no separate release PR, no hand-run `git tag` /
# `gh release`. It is idempotent: a push to main whose version is already
# tagged (e.g. a merge that didn't bump, or a re-run) is a clean no-op.
#
# CI green is enforced by branch protection on main, so a merge commit here is
# already a passing build. The `release-guard` job in ci.yml independently keeps
# the version ↔ CHANGELOG entry in sync on every PR.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Tag + GitHub release on version bump
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.1"

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Has this version already been released?
        id: check
        run: |
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.ver.outputs.version }} is already tagged — nothing to release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.ver.outputs.version }} is new — will tag + release."
          fi

      - name: Validate release hygiene
        if: steps.check.outputs.exists == 'false'
        run: node scripts/check-release.mjs

      - name: Extract release notes from CHANGELOG
        if: steps.check.outputs.exists == 'false'
        run: node scripts/check-release.mjs --notes > "${{ runner.temp }}/notes.md"

      - name: Create annotated tag + GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: v${{ steps.ver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$V" -m "$V"
          git push origin "$V"
          gh release create "$V" --title "$V" --notes-file "${{ runner.temp }}/notes.md"
          echo "Released $V."

  # Publish the PUBLIC packages to npm. Runs AFTER `release` so the `vX.Y.Z` tag
  # exists before we publish — the published CLI pins that tag for its runtime
  # adapter fetch (hermes), so the order matters. Idempotent in two independent
  # ways, mirroring the release job's "every merge is a release, re-runs no-op"
  # contract:
  #   - per package, it skips if that exact version is already on npm — so a
  #     no-bump merge is a no-op AND a re-run after a half-failed publish
  #     recovers (it publishes only what's still missing);
  #   - if NPM_TOKEN isn't set yet, it logs and exits 0 — so this workflow is
  #     safe to land BEFORE the secret exists; auto-publish switches on the
  #     moment the owner adds the secret, with no further code change.
  # Private `@librarian/*` workspace packages are never published (private:true).
  publish-npm:
    name: Publish public packages to npm
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.1"

      - name: Enable corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the CLI
        run: pnpm --filter @the-librarian/cli build

      - name: Publish @the-librarian/cli (idempotent; skips if already on npm)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set — skipping npm publish."
            echo "Add the NPM_TOKEN repo secret (an npm automation token) to enable auto-publish."
            exit 0
          fi
          pnpm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
          PKG=@the-librarian/cli
          # Single source of truth: the ROOT package.json version (the one every
          # PR bumps + the `release` job tags above). The published package's own
          # version had drifted (frozen at rc.5 while root advanced), so the read
          # below kept seeing a version already on npm and the publish silently
          # no-op'd. Stamp the root version into every public workspace package so
          # the npm artifact always matches the tag. `--no-git-checks` (below)
          # tolerates the resulting dirty tree.
          node scripts/stamp-version.mjs
          V="$(node -p "require('./package.json').version")"
          if npm view "${PKG}@${V}" version >/dev/null 2>&1; then
            echo "${PKG}@${V} already on npm — nothing to publish."
          else
            echo "Publishing ${PKG}@${V}…"
            pnpm --filter "${PKG}" publish --access public --no-git-checks
            echo "Published ${PKG}@${V}."
          fi
