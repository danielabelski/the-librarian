name: CI

on:
  push:
  # `pull_request:` is intentionally absent. With both triggers, every
  # PR push fires CI twice (once for the branch push, once for the PR's
  # merge ref) because the concurrency group is keyed by `github.ref`
  # which differs between the two. Push-only is sufficient — the PR UI
  # picks up the branch's check runs automatically.

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, test, build, smoke, healthcheck, guards
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.1"

      - name: Enable corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

      - name: Smoke test
        run: pnpm run smoke

      - name: Healthcheck
        run: pnpm run healthcheck

      - name: Guard — test-count floor
        run: pnpm run check:test-count

      - name: Guard — storage compatibility fixture
        run: pnpm run check:storage-fixture

      - name: Guard — projection schema version
        run: pnpm run check:schema-version

      - name: Validate Docker Compose config
        env:
          LIBRARIAN_ADMIN_TOKEN: ci-admin-token
          LIBRARIAN_AGENT_TOKEN: ci-agent-token
        run: docker compose -f docker/docker-compose.yml config

  docker-image:
    name: Single-container image build + smoke
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build the all-in-one image
        run: docker build -f docker/all-in-one.Dockerfile -t librarian-all-in-one:ci .

      - name: Run it and smoke both health endpoints
        run: |
          set -euo pipefail
          # Tokens are required: the image binds 0.0.0.0, so the MCP boot guard
          # refuses to start without an admin token (the production contract).
          # /healthz + /api/health are both public, so the smoke still works.
          docker run -d --name librarian-ci -p 3000:3000 -p 3838:3838 \
            -e LIBRARIAN_ADMIN_TOKEN=ci-admin-token \
            -e LIBRARIAN_AGENT_TOKEN=ci-agent-token \
            -e LIBRARIAN_SECRET_KEY="$(openssl rand -hex 32)" \
            librarian-all-in-one:ci
          ok=0
          for _ in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null \
               && curl -fsS http://127.0.0.1:3838/healthz >/dev/null; then
              ok=1; break
            fi
            sleep 2
          done
          echo "--- container logs ---"; docker logs librarian-ci || true
          docker rm -f librarian-ci >/dev/null 2>&1 || true
          if [ "$ok" != "1" ]; then echo "image did not become healthy"; exit 1; fi
          echo "both endpoints healthy"

  e2e:
    name: Dashboard e2e (Playwright)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.1"

      - name: Enable corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Include the lockfile so Renovate / manual pnpm-up bumps that
          # only touch pnpm-lock.yaml still invalidate the browser cache.
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/dashboard/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browser
        run: pnpm --filter @librarian/dashboard test:e2e:install

      - name: Run e2e suite
        env:
          LIBRARIAN_E2E_ADMIN_TOKEN: e2e-admin-token
          LIBRARIAN_E2E_DATA_DIR: ${{ runner.temp }}/librarian-e2e-data
        run: pnpm --filter @librarian/dashboard test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report
          retention-days: 7

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/dashboard/test-results
          retention-days: 7

  # The `integration-wrappers` job was deleted here. The five harnesses
  # (Claude Code, Codex, Hermes, OpenCode, Pi) all ship as standalone
  # plugin repos that own their own CI; no in-tree wrappers remain to
  # smoke-test. The shared lifecycle helper at
  # `integrations/shared/librarian-lifecycle/` has its own vitest suite
  # exercised by the main `Lint, typecheck, test, build, …` job above.
