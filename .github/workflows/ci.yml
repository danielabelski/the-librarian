name: CI

on:
  push:
  # `pull_request:` is intentionally absent. With both triggers, every
  # PR push fires CI twice (once for the branch push, once for the PR's
  # merge ref) because the concurrency group is keyed by `github.ref`
  # which differs between the two. Push-only is sufficient — the PR UI
  # picks up the branch's check runs automatically.

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, test, build, smoke, healthcheck, guards
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.1"

      - name: Enable corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

      - name: Smoke test
        run: pnpm run smoke

      - name: Healthcheck
        run: pnpm run healthcheck

      - name: Guard — test-count floor
        run: pnpm run check:test-count

      - name: Guard — storage compatibility fixture
        run: pnpm run check:storage-fixture

      - name: Guard — projection schema version
        run: pnpm run check:schema-version

      - name: Guard — session state divergence
        run: pnpm run check:session-state-divergence

      - name: Validate Docker Compose config
        env:
          LIBRARIAN_ADMIN_TOKEN: ci-admin-token
          LIBRARIAN_AGENT_TOKEN: ci-agent-token
        run: docker compose -f docker/docker-compose.yml config

  e2e:
    name: Dashboard e2e (Playwright)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.1"

      - name: Enable corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Include the lockfile so Renovate / manual pnpm-up bumps that
          # only touch pnpm-lock.yaml still invalidate the browser cache.
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/dashboard/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browser
        run: pnpm --filter @librarian/dashboard test:e2e:install

      - name: Run e2e suite
        env:
          LIBRARIAN_E2E_ADMIN_TOKEN: e2e-admin-token
          LIBRARIAN_E2E_DATA_DIR: ${{ runner.temp }}/librarian-e2e-data
        run: pnpm --filter @librarian/dashboard test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report
          retention-days: 7

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/dashboard/test-results
          retention-days: 7

  integration-wrappers:
    name: Integration wrapper smoke (${{ matrix.harness }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        harness: [claude-code, codex, opencode, pi]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.1"

      - name: Enable corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expose the-librarian CLI on PATH
        run: |
          # pnpm install symlinks the @librarian/cli bin into node_modules/.bin.
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run wrapper against `echo ok`
        env:
          LIBRARIAN_DATA_DIR: ${{ runner.temp }}/librarian-data-${{ matrix.harness }}
        run: |
          set -euo pipefail
          mkdir -p "$LIBRARIAN_DATA_DIR"
          extra=()
          if [[ "${{ matrix.harness }}" == "pi" ]]; then
            extra=(--device ci-device)
          fi
          bash "integrations/${{ matrix.harness }}/wrapper.sh" \
            --project the-librarian \
            --title "ci smoke ${{ matrix.harness }}" \
            "${extra[@]}" \
            -- echo ok
